<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GT50 PRO | Ice Exam Roulette</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --ice: #78F7FF;
            --ice2: #B9FBFF;
            --deep: #050B18;
            --deep2: #081427;
            --blue: #1F8CFF;
            --cyan: #00E5FF;
            --white: #F2FDFF;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            background:
                radial-gradient(circle at 20% 15%, rgba(0, 229, 255, 0.28), transparent 28%),
                radial-gradient(circle at 80% 20%, rgba(31, 140, 255, 0.22), transparent 30%),
                radial-gradient(circle at 50% 90%, rgba(120, 247, 255, 0.16), transparent 35%),
                linear-gradient(135deg, #020611 0%, #061225 45%, #020611 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            font-family: "Segoe UI", "Poppins", "Inter", system-ui, -apple-system, sans-serif;
            color: var(--white);
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            inset: -30%;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            background:
                radial-gradient(circle, rgba(255,255,255,0.95) 1.1px, transparent 1.8px),
                radial-gradient(circle, rgba(185,251,255,0.75) 1.4px, transparent 2.2px),
                radial-gradient(circle, rgba(255,255,255,0.50) 0.8px, transparent 1.4px);
            background-size: 34px 34px, 58px 58px, 86px 86px;
            animation: snowFall 16s linear infinite;
            opacity: 0.72;
        }

        body::after {
            background:
                radial-gradient(circle, rgba(255,255,255,0.68) 1.5px, transparent 2.6px),
                radial-gradient(circle, rgba(120,247,255,0.46) 2px, transparent 3px);
            background-size: 96px 96px, 135px 135px;
            animation: snowFallSlow 28s linear infinite;
            opacity: 0.42;
            filter: blur(0.6px);
        }

        .snow-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .snowflake {
            position: absolute;
            top: -12px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            box-shadow: 0 0 12px rgba(185,251,255,0.85);
            animation: snowflakeFall linear infinite;
        }

        .snowflake:nth-child(1) { left: 6%; animation-duration: 9s; animation-delay: -1s; opacity: .7; }
        .snowflake:nth-child(2) { left: 14%; animation-duration: 13s; animation-delay: -4s; width: 4px; height: 4px; }
        .snowflake:nth-child(3) { left: 23%; animation-duration: 11s; animation-delay: -2s; }
        .snowflake:nth-child(4) { left: 31%; animation-duration: 16s; animation-delay: -7s; width: 3px; height: 3px; }
        .snowflake:nth-child(5) { left: 42%; animation-duration: 10s; animation-delay: -3s; }
        .snowflake:nth-child(6) { left: 53%; animation-duration: 15s; animation-delay: -5s; width: 5px; height: 5px; }
        .snowflake:nth-child(7) { left: 64%; animation-duration: 12s; animation-delay: -6s; }
        .snowflake:nth-child(8) { left: 73%; animation-duration: 18s; animation-delay: -8s; width: 4px; height: 4px; }
        .snowflake:nth-child(9) { left: 84%; animation-duration: 14s; animation-delay: -2s; }
        .snowflake:nth-child(10) { left: 92%; animation-duration: 10s; animation-delay: -5s; width: 3px; height: 3px; }
        .snowflake:nth-child(11) { left: 36%; animation-duration: 20s; animation-delay: -10s; opacity: .55; }
        .snowflake:nth-child(12) { left: 78%; animation-duration: 22s; animation-delay: -11s; opacity: .45; }

        @keyframes snowFall {
            from { transform: translate3d(0, -8%, 0); }
            to { transform: translate3d(-7%, 18%, 0); }
        }

        @keyframes snowFallSlow {
            from { transform: translate3d(0, -12%, 0); }
            to { transform: translate3d(8%, 22%, 0); }
        }

        @keyframes snowflakeFall {
            0% { transform: translate3d(0, -20px, 0) scale(0.8); }
            50% { transform: translate3d(34px, 52vh, 0) scale(1.08); }
            100% { transform: translate3d(-22px, 108vh, 0) scale(0.8); }
        }

        .smoke-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }

        .smoke {
            position: absolute;
            width: 360px;
            height: 120px;
            border-radius: 999px;
            background: radial-gradient(circle at 50% 50%, rgba(185,251,255,0.24), transparent 68%);
            filter: blur(24px);
            opacity: 0.45;
            animation: smokeMove 11s ease-in-out infinite;
        }

        .smoke.s1 { left: -110px; top: 18%; animation-delay: 0s; }
        .smoke.s2 { right: -120px; top: 46%; animation-delay: -4s; }
        .smoke.s3 { left: 22%; bottom: 4%; animation-delay: -7s; width: 460px; }

        @keyframes smokeMove {
            0%, 100% { transform: translateX(0) translateY(0) scale(1); opacity: 0.22; }
            50% { transform: translateX(70px) translateY(-28px) scale(1.18); opacity: 0.55; }
        }

        .glass-container {
            position: relative;
            z-index: 2;
            max-width: 680px;
            width: 100%;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04)),
                rgba(5, 13, 28, 0.70);
            backdrop-filter: blur(26px) saturate(145%);
            -webkit-backdrop-filter: blur(26px) saturate(145%);
            border-radius: 38px;
            border: 1px solid rgba(185, 251, 255, 0.34);
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.06) inset,
                0 0 45px rgba(0,229,255,0.22),
                0 30px 70px rgba(0,0,0,0.60);
            padding: 24px;
            overflow: hidden;
        }

        .glass-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(115deg, transparent 0%, rgba(255,255,255,0.18) 22%, transparent 38%),
                radial-gradient(circle at 50% -10%, rgba(120,247,255,0.22), transparent 42%);
            pointer-events: none;
        }

        .glass-container::after {
            content: "";
            position: absolute;
            left: 8%;
            right: 8%;
            top: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(185,251,255,0.95), transparent);
            box-shadow: 0 0 24px rgba(120,247,255,0.75);
        }

        .header {
            position: relative;
            text-align: center;
            margin-bottom: 18px;
        }

        .logo-stack {
            position: relative;
            display: grid;
            justify-items: center;
            gap: 10px;
            margin: 0 auto 12px;
        }

        .gt-logo {
            max-width: 245px;
            width: 72%;
            height: auto;
            object-fit: contain;
            filter:
                drop-shadow(0 0 18px rgba(120,247,255,0.85))
                drop-shadow(0 0 35px rgba(31,140,255,0.35));
        }

        .infinix-logo {
            max-width: 145px;
            width: 45%;
            height: auto;
            object-fit: contain;
            opacity: 0.96;
            filter:
                drop-shadow(0 0 10px rgba(185,251,255,0.55))
                drop-shadow(0 0 20px rgba(31,140,255,0.18));
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.1rem);
            line-height: 0.98;
            font-weight: 950;
            letter-spacing: -1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #FFFFFF 8%, #B9FBFF 45%, #35DFFF 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 34px rgba(0,229,255,0.16);
        }

        .subtitle {
            color: rgba(242,253,255,0.62);
            font-size: 0.82rem;
            margin-top: 10px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
        }

        .roulette-wrapper {
            position: relative;
            margin: 8px 0 14px;
            display: flex;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            width: 330px;
            height: 330px;
            margin: 0 auto;
            border-radius: 50%;
            background:
                radial-gradient(circle, rgba(255,255,255,0.12), transparent 62%),
                conic-gradient(from 0deg, rgba(120,247,255,0.32), transparent, rgba(31,140,255,0.32), transparent, rgba(120,247,255,0.32));
            box-shadow:
                0 0 35px rgba(0,229,255,0.30),
                0 0 80px rgba(31,140,255,0.16);
        }

        .wheel-container::before {
            content: "";
            position: absolute;
            inset: -9px;
            border-radius: 50%;
            border: 1px solid rgba(185,251,255,0.32);
            box-shadow: inset 0 0 24px rgba(185,251,255,0.12);
        }

        .wheel-container::after {
            content: "";
            position: absolute;
            inset: 18px;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 5%, rgba(255,255,255,0.24), transparent 34%);
            pointer-events: none;
            z-index: 5;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            filter: drop-shadow(0 20px 35px rgba(0,0,0,0.55));
        }

        .pointer-container {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pointer-diamond {
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 28px solid #DDFEFF;
            filter:
                drop-shadow(0 0 8px rgba(120,247,255,0.95))
                drop-shadow(0 4px 5px rgba(0,0,0,0.55));
        }

        .pointer-circle {
            width: 10px;
            height: 10px;
            background: var(--ice);
            border-radius: 50%;
            margin-top: -5px;
            box-shadow: 0 0 14px rgba(120,247,255,1);
        }

        .spin-btn {
            position: relative;
            display: block;
            width: min(390px, 88%);
            margin: 14px auto 16px;
            padding: 15px 20px;
            font-size: 1.03rem;
            font-weight: 950;
            background:
                linear-gradient(135deg, rgba(185,251,255,0.95), rgba(0,229,255,0.72) 42%, rgba(31,140,255,0.90));
            border: 1px solid rgba(255,255,255,0.55);
            border-radius: 999px;
            color: #03101F;
            cursor: pointer;
            transition: all 0.22s ease;
            text-transform: uppercase;
            letter-spacing: 2.4px;
            box-shadow:
                0 0 24px rgba(0,229,255,0.34),
                inset 0 1px 0 rgba(255,255,255,0.75);
            overflow: hidden;
        }

        .spin-btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: -80%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.65), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .spin-btn:hover::before {
            left: 120%;
        }

        .spin-btn:hover {
            transform: translateY(-2px) scale(1.015);
            box-shadow:
                0 0 34px rgba(120,247,255,0.55),
                0 14px 35px rgba(0,0,0,0.28);
        }

        .spin-btn:active {
            transform: scale(0.98);
        }

        .spin-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }

        .sound-note {
            text-align: center;
            margin: -6px 0 10px;
            font-size: 0.68rem;
            letter-spacing: 1px;
            color: rgba(185,251,255,0.62);
            text-transform: uppercase;
        }

        .result-card {
            position: relative;
            background:
                linear-gradient(145deg, rgba(255,255,255,0.13), rgba(255,255,255,0.04)),
                rgba(3, 12, 27, 0.72);
            backdrop-filter: blur(16px);
            border-radius: 26px;
            padding: 16px;
            margin: 10px 0;
            text-align: center;
            border: 1px solid rgba(185,251,255,0.24);
            box-shadow: inset 0 0 22px rgba(120,247,255,0.07);
            transition: transform 0.2s ease;
            overflow: hidden;
        }

        .result-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(120,247,255,0.20), transparent 48%);
            pointer-events: none;
        }

        .result-label {
            position: relative;
            font-size: 0.66rem;
            text-transform: uppercase;
            letter-spacing: 2.7px;
            color: var(--ice);
            margin-bottom: 8px;
            font-weight: 800;
        }

        .question-text {
            position: relative;
            font-size: 1.45rem;
            font-weight: 950;
            color: #FFFFFF;
            margin: 6px 0;
            text-shadow: 0 0 18px rgba(120,247,255,0.42);
        }

        .link-button {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(185,251,255,0.92));
            padding: 10px 24px;
            border-radius: 999px;
            text-decoration: none;
            color: #03101F;
            font-weight: 900;
            margin-top: 8px;
            transition: 0.2s;
            font-size: 0.84rem;
            box-shadow: 0 0 18px rgba(120,247,255,0.25);
        }

        .link-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 28px rgba(120,247,255,0.48);
        }

        .spin-count {
            text-align: center;
            font-size: 0.68rem;
            color: rgba(242,253,255,0.55);
            margin-top: 8px;
            letter-spacing: 0.8px;
        }

        .history-section {
            margin-top: 13px;
            padding-top: 12px;
            border-top: 1px solid rgba(185,251,255,0.15);
        }

        .history-title {
            font-size: 0.72rem;
            color: rgba(185,251,255,0.62);
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 1.6px;
            text-transform: uppercase;
        }

        .history-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            justify-content: center;
        }

        .history-item {
            background: rgba(185,251,255,0.08);
            padding: 5px 12px;
            border-radius: 999px;
            font-size: 0.7rem;
            color: #DDFEFF;
            border: 1px solid rgba(120,247,255,0.20);
            box-shadow: inset 0 0 10px rgba(120,247,255,0.05);
        }

        @media (max-width: 500px) {
            body {
                padding: 12px;
            }

            .glass-container {
                padding: 18px 14px;
                border-radius: 30px;
            }

            .gt-logo {
                width: 82%;
                max-width: 210px;
            }

            .infinix-logo {
                width: 52%;
                max-width: 125px;
            }

            .wheel-container {
                width: 270px;
                height: 270px;
            }

            .spin-btn {
                width: 92%;
                font-size: 0.9rem;
                padding: 13px 14px;
            }

            .question-text {
                font-size: 1.15rem;
            }

            .pointer-container {
                top: -14px;
            }

            .pointer-diamond {
                border-left: 10px solid transparent;
                border-right: 10px solid transparent;
                border-top: 21px solid #DDFEFF;
            }
        }
    </style>
</head>

<body>

<div class="snow-layer">
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
    <div class="snowflake"></div>
</div>

<div class="smoke-layer">
    <div class="smoke s1"></div>
    <div class="smoke s2"></div>
    <div class="smoke s3"></div>
</div>

<div class="glass-container">

    <div class="header">
        <div class="logo-stack">
            <img src="gt50pro.png" alt="GT50 PRO" class="gt-logo">
            <img src="infinix.png" alt="Infinix" class="infinix-logo">
        </div>

        <h1>
            Exam Roulette
        </h1>

        <div class="subtitle">
            Randomizer System
        </div>
    </div>

    <div class="roulette-wrapper">
        <div class="wheel-container">

            <div class="pointer-container">
                <div class="pointer-diamond"></div>
                <div class="pointer-circle"></div>
            </div>

            <canvas id="wheelCanvas" width="540" height="540"></canvas>

        </div>
    </div>

    <button class="spin-btn" id="spinBtn">
        ❄ SPIN THE ICE WHEEL
    </button>

    <div class="sound-note" id="soundNote">
        🔊 Roulette sound enabled
    </div>

    <div class="result-card" id="resultCard">
        <div class="result-label">
            ▼ SELECTED SET ▼
        </div>

        <div class="question-text" id="questionText">
            —
        </div>

        <div id="linkContainer"></div>
    </div>

    <div class="spin-count" id="spinCount">
        📊 Spins: 0
    </div>

    <div class="history-section">
        <div class="history-title">
            Recently Selected
        </div>

        <div class="history-buttons" id="historyContainer"></div>
    </div>

</div>

<script>
    const SETS = [
        { name: "Set 1", url: "https://forms.gle/hZpS8EMYZE75kiBk9" },
        { name: "Set 2", url: "https://forms.gle/h2dX9T3vPZUgDwez6" },
        { name: "Set 3", url: "https://forms.gle/9vJtdevtyz4YFhz5A" },
        { name: "Set 4", url: "https://forms.gle/WBQ5F7gGognaB6kn8" },
        { name: "Set 5", url: "https://forms.gle/ipA4HETbaaCNq9Wq5" },
        { name: "Set 6", url: "https://forms.gle/Kr1oxNcGicLAiW4WA" },
        { name: "Set 7", url: "https://forms.gle/BuzaFpkf319ia7Qs9" },
        { name: "Set 8", url: "https://forms.gle/5ZrjSdKPEUxvn7WX8" },
        { name: "Set 9", url: "https://forms.gle/etLGU933vjgdpVNp8" },
        { name: "Set 10", url: "https://forms.gle/pVH3SeNaeUgTNJ9Z6" },
        { name: "Set 11", url: "https://docs.google.com/forms/d/1abAaQduGadKoaDy05GTu7aRHNA-maRY5iZKUMmvQoOM/edit" },
        { name: "Set 12", url: "https://docs.google.com/forms/d/1EtHf012q-yY-na2TIjWRoGaSO5-gm1ecb2rfCIPTE2k/edit" },
        { name: "Set 13", url: "https://docs.google.com/forms/d/1Umaj-bOokQn1oJwBZKnbwyqFgrQk_5z2J7mbbU1joUA/edit" },
        { name: "Set 14", url: "https://docs.google.com/forms/d/1j7paJ7tlABSUj-cTXZpukFQZ7cEJnAmWLKxlmzyLKko/edit" },
        { name: "Set 15", url: "https://docs.google.com/forms/d/19W3hDHjnzU_FKLnu33L4Ot-2K-L8icYdr6xqXzSTGCE/edit" }
    ];

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');

    let audioCtx = null;
    let nextTickTime = 0;
    let lastTickTime = 0;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function playTick(volume = 0.16, pitch = 950) {
        if (!audioCtx) return;

        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();

        osc.type = 'square';
        osc.frequency.setValueAtTime(pitch, audioCtx.currentTime);

        filter.type = 'highpass';
        filter.frequency.setValueAtTime(650, audioCtx.currentTime);

        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.035);

        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.04);
    }

    function playLandSound() {
        if (!audioCtx) return;

        const now = audioCtx.currentTime;

        const osc1 = audioCtx.createOscillator();
        const gain1 = audioCtx.createGain();

        osc1.type = 'triangle';
        osc1.frequency.setValueAtTime(740, now);
        osc1.frequency.exponentialRampToValueAtTime(370, now + 0.18);

        gain1.gain.setValueAtTime(0.24, now);
        gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.22);

        osc1.connect(gain1);
        gain1.connect(audioCtx.destination);

        osc1.start(now);
        osc1.stop(now + 0.24);

        setTimeout(() => playTick(0.20, 520), 110);
    }

    let currentRotation = 0;
    let spinning = false;
    let spinCount = 0;
    let recentSelections = [];
    let animFrame = null;
    let spinStartTime = 0;
    let spinDuration = 3200;
    let startRotation = 0;
    let targetRotation = 0;

    const PI = Math.PI;
    const TAU = PI * 2;

    const SEG_COUNT = SETS.length;
    const SEG_ANGLE = TAU / SEG_COUNT;

    const colors = [
        '#B9FBFF',
        '#63E9FF',
        '#1F8CFF',
        '#8AD8FF',
        '#E9FFFF',
        '#46C7FF',
        '#0E63C7',
        '#A8F7FF',
        '#2BA9FF',
        '#DDFEFF',
        '#5CDFFF',
        '#1676E8',
        '#C9FCFF',
        '#7CD0FF',
        '#0A4DA8'
    ];

    function drawWheel(rot) {
        const sz = canvas.width;
        const cx = sz / 2;
        const cy = sz / 2;
        const rad = sz / 2 - 16;

        ctx.clearRect(0, 0, sz, sz);

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, rad + 8, 0, TAU);
        ctx.fillStyle = 'rgba(185,251,255,0.18)';
        ctx.shadowColor = 'rgba(120,247,255,0.75)';
        ctx.shadowBlur = 24;
        ctx.fill();
        ctx.restore();

        for (let i = 0; i < SEG_COUNT; i++) {
            const start = i * SEG_ANGLE + rot;
            const end = start + SEG_ANGLE;

            const grad = ctx.createRadialGradient(cx, cy, 10, cx, cy, rad);
            grad.addColorStop(0, 'rgba(255,255,255,0.96)');
            grad.addColorStop(0.24, colors[i % colors.length]);
            grad.addColorStop(1, '#052A54');

            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, rad, start, end);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();

            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,255,0.62)';
            ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(185,251,255,0.65)';
            ctx.shadowBlur = 4;
            ctx.stroke();
            ctx.restore();

            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(start + SEG_ANGLE / 2);
            ctx.fillStyle = '#03101F';
            ctx.font = `900 ${Math.min(17, rad / 5.8)}px "Segoe UI", "Inter"`;
            ctx.shadowColor = 'rgba(255,255,255,0.65)';
            ctx.shadowBlur = 8;
            ctx.textAlign = 'center';
            ctx.fillText(SETS[i].name, rad * 0.66, 6);
            ctx.restore();
        }

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, 44, 0, TAU);
        ctx.fillStyle = 'rgba(3,16,31,0.92)';
        ctx.shadowColor = 'rgba(120,247,255,0.95)';
        ctx.shadowBlur = 20;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(cx, cy, 32, 0, TAU);
        ctx.fillStyle = 'rgba(185,251,255,0.94)';
        ctx.fill();

        ctx.fillStyle = '#03101F';
        ctx.font = '900 16px "Segoe UI", "Inter"';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('GT', cx, cy - 1);
        ctx.restore();
    }

    function getSetFromRotation(rot) {
        const pointerAngle = -PI / 2;
        let wheelAngleAtPointer = (pointerAngle - rot) % TAU;

        if (wheelAngleAtPointer < 0) {
            wheelAngleAtPointer += TAU;
        }

        let idx = Math.floor(wheelAngleAtPointer / SEG_ANGLE);

        if (idx >= SEG_COUNT) {
            idx = SEG_COUNT - 1;
        }

        return {
            index: idx,
            set: SETS[idx]
        };
    }

    function getRotationForSet(setIndex) {
        const pointerAngle = -PI / 2;
        const targetSegmentCenter = setIndex * SEG_ANGLE + SEG_ANGLE / 2;

        let neededRot = pointerAngle - targetSegmentCenter;
        neededRot = ((neededRot % TAU) + TAU) % TAU;

        return neededRot;
    }

    function animateSpin(now) {
        const elapsed = now - spinStartTime;
        let t = Math.min(1, elapsed / spinDuration);

        const easeOut = 1 - Math.pow(1 - t, 3.7);
        const newRot = startRotation + (targetRotation - startRotation) * easeOut;

        currentRotation = newRot % TAU;
        drawWheel(currentRotation);

        if (audioCtx) {
            const tickDelay = 35 + (t * 145);

            if (now - lastTickTime > tickDelay) {
                const pitch = 1180 - (t * 420);
                const volume = 0.19 - (t * 0.07);

                playTick(volume, pitch);
                lastTickTime = now;
            }
        }

        if (t < 1) {
            animFrame = requestAnimationFrame(animateSpin);
        } else {
            currentRotation = targetRotation % TAU;
            drawWheel(currentRotation);

            const landed = getSetFromRotation(currentRotation);
            updateUI(landed.set);
            playLandSound();

            spinning = false;
            document.getElementById('spinBtn').disabled = false;

            cancelAnimationFrame(animFrame);
        }
    }

    function updateUI(set) {
        document.getElementById('questionText').innerHTML = set.name;

        document.getElementById('linkContainer').innerHTML = `
            <a href="${set.url}" target="_blank" class="link-button">
                OPEN ${set.name} →
            </a>
        `;

        recentSelections.unshift(set.name);

        if (recentSelections.length > 6) {
            recentSelections.pop();
        }

        const histDiv = document.getElementById('historyContainer');

        histDiv.innerHTML = recentSelections
            .map(name => `<div class="history-item">${name}</div>`)
            .join('');

        spinCount++;

        document.getElementById('spinCount').innerHTML = `📊 Spins: ${spinCount}`;

        const card = document.getElementById('resultCard');

        card.style.transform = 'scale(1.015)';

        setTimeout(() => {
            card.style.transform = 'scale(1)';
        }, 160);
    }

    function spinWheel() {
        if (spinning) return;

        initAudio();
        lastTickTime = 0;

        spinning = true;

        const btn = document.getElementById('spinBtn');
        btn.disabled = true;

        const randomIndex = Math.floor(Math.random() * SETS.length);
        const targetStopRot = getRotationForSet(randomIndex);
        const fullSpins = 6 + Math.random() * 8;
        const finalTarget = targetStopRot + (fullSpins * TAU);

        startRotation = currentRotation;
        targetRotation = finalTarget;
        spinStartTime = performance.now();

        animFrame = requestAnimationFrame(animateSpin);
    }

    function init() {
        currentRotation = Math.random() * TAU;
        drawWheel(currentRotation);

        document.getElementById('spinBtn').onclick = spinWheel;
    }

    init();
</script>

</body>
</html>
