<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NOTE60 Ultra | Exam Roulette</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 50%, #0A0F1A, #05080F);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;
        }

        .glass-container {
            max-width: 700px;
            width: 100%;
            background: rgba(15, 20, 35, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 28px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #00D4AA, #009B82);
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #0A0F1A;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #00D4AA);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            margin-top: 6px;
            letter-spacing: 0.5px;
        }

        .roulette-wrapper {
            position: relative;
            margin: 10px 0 20px;
            display: flex;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        /* Elegant Small Pointer */
        .pointer-container {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .pointer-diamond {
            width: 0;
            height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 24px solid #FFD966;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }
        .pointer-circle {
            width: 8px;
            height: 8px;
            background: #FFD966;
            border-radius: 50%;
            margin-top: -4px;
            box-shadow: 0 0 6px rgba(255,217,102,0.6);
        }

        .spin-btn {
            display: block;
            width: 80%;
            margin: 15px auto 20px;
            padding: 14px 20px;
            font-size: 1.2rem;
            font-weight: 700;
            background: linear-gradient(95deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 212, 170, 0.5);
            border-radius: 50px;
            color: #00D4AA;
            cursor: pointer;
            transition: all 0.25s ease;
            text-transform: uppercase;
            letter-spacing: 2.5px;
        }
        .spin-btn:hover {
            background: rgba(0, 212, 170, 0.15);
            border-color: #00D4AA;
            color: white;
            transform: scale(1.02);
        }
        .spin-btn:active { transform: scale(0.98); }
        .spin-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 18px;
            margin: 12px 0;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .result-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            color: #00D4AA;
            margin-bottom: 8px;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #F0F3FA;
            margin: 6px 0;
        }
        .link-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #00D4AA, #009B82);
            padding: 10px 24px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            margin-top: 8px;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        .link-button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #009B82, #006D5C);
        }

        .history-section {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        .history-title {
            font-size: 0.7rem;
            color: #777;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 1px;
        }
        .history-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .history-item {
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 25px;
            font-size: 0.7rem;
            color: #BBB;
            border: 1px solid rgba(0, 212, 170, 0.2);
        }
        .spin-count {
            text-align: center;
            font-size: 0.65rem;
            color: #666;
            margin-top: 10px;
        }

        @media (max-width: 500px) {
            .glass-container { padding: 18px; }
            .wheel-container { width: 260px; height: 260px; }
            h1 { font-size: 1.6rem; }
            .question-text { font-size: 1rem; }
            .pointer-diamond { border-left: 9px solid transparent; border-right: 9px solid transparent; border-top: 18px solid #FFD966; }
            .pointer-container { top: -14px; }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header">
        <div class="badge">✦ INFINIX ✦</div>
        <h1>NOTE60 INFINIX<br>Exam Roulette</h1>
        <div class="subtitle">Randomized Questionnaire Selector</div>
    </div>

    <div class="roulette-wrapper">
        <div class="wheel-container">
            <div class="pointer-container">
                <div class="pointer-diamond"></div>
                <div class="pointer-circle"></div>
            </div>
            <canvas id="wheelCanvas" width="540" height="540"></canvas>
        </div>
    </div>

    <button class="spin-btn" id="spinBtn">🎡 SPIN THE WHEEL</button>

    <div class="result-card" id="resultCard">
        <div class="result-label">▼ SELECTED SET ▼</div>
        <div class="question-text" id="questionText">—</div>
        <div id="linkContainer"></div>
    </div>

    <div class="spin-count" id="spinCount">📊 Spins: 0</div>

    <div class="history-section">
        <div class="history-title">📋 Recently Selected</div>
        <div class="history-buttons" id="historyContainer"></div>
    </div>
</div>

<script>
    // ========= YOUR 20 SETS ==========
    const SETS = [
        { name: "Set 1", url: "https://docs.google.com/forms/d/e/1FAIpQLSeHpQSDFGjW5d3yHboSE4D_QshslNxZuikmeneb6ARftuF3lw/viewform" },
        { name: "Set 2", url: "https://docs.google.com/forms/d/e/1FAIpQLSdXfW_rqCEOmDeXQOHIOb9sLNtlL16kzUJtSF-Q79NkzjHBCQ/viewform" },
        { name: "Set 3", url: "https://docs.google.com/forms/d/e/1FAIpQLSe13C_V53ymlA1NshbOmGvDlL0-FOYuDLBIUiRis5fLNri2FQ/viewform" },
        { name: "Set 4", url: "https://docs.google.com/forms/d/e/1FAIpQLSdoA9FpiCn-rmgZPMcf-Ljq18h6QVYInd_8Q4VvvXudqQ-Bvg/viewform" },
        { name: "Set 5", url: "https://docs.google.com/forms/d/e/1FAIpQLSffkCh9xHtWfx4FglPH7MiVLZUVbbG7M2nyC1GFfwXvYBWRVg/viewform" },
        { name: "Set 6", url: "https://forms.gle/6ms39r81DU58GqXe6" },
        { name: "Set 7", url: "https://forms.gle/bQ9d4rAE5nQ4JLWa6" },
        { name: "Set 8", url: "https://forms.gle/KuHW3ot8JC5WMbPB6" },
        { name: "Set 9", url: "https://forms.gle/DVTTpApdT2qxZUHD7" },
        { name: "Set 10", url: "https://forms.gle/z5ucuMpWnnVD3snt7" },
        { name: "Set 11", url: "https://forms.gle/e154QuYQEa4p9xzX8" },
        { name: "Set 12", url: "https://forms.gle/emvJBwbyrDAtj7566" },
        { name: "Set 13", url: "https://forms.gle/6oG5cdZtspPUhQvr5" },
        { name: "Set 14", url: "https://forms.gle/p7nApE3VbEV3Z7iv5" },
        { name: "Set 15", url: "https://forms.gle/dMvDKbdQbBKSueHz8" },
        { name: "Set 16", url: "https://docs.google.com/forms/d/e/1FAIpQLSftVcYHnfj9jkb4XrPjuSfpDOR0JXpCSeJY39OiGk0AnNt0ew/viewform" },
        { name: "Set 17", url: "https://docs.google.com/forms/d/e/1FAIpQLScx5QHRe-6KIpJERyjo9x1kiyCUqsVRSycLKTeX7_eKog_Q7Q/viewform" },
        { name: "Set 18", url: "https://docs.google.com/forms/d/e/1FAIpQLSdTNHWbs1CGLNoECir7f0wp2Q9QfAXh6n9pNm1MajRlvqAWvA/viewform" },
        { name: "Set 19", url: "https://docs.google.com/forms/d/e/1FAIpQLSdYKy6JD7RhKNQZSn_wvPPOTtA9I6pd33Yxrcym4Qm5OFoB6w/viewform" },
        { name: "Set 20", url: "https://docs.google.com/forms/d/e/1FAIpQLSeujgdKpQtNv4wGX4xFxGeSbGZgilIYSnOokzMdQorka_O4gQ/viewform" }
    ];
    // ================================

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let currentRotation = 0;
    let spinning = false;
    let spinCount = 0;
    let recentSelections = [];
    let animFrame = null;
    let spinStartTime = 0;
    let spinDuration = 2800;
    let startRotation = 0;
    let targetRotation = 0;
    let selectedSet = null;

    const PI = Math.PI;
    const TAU = PI * 2;
    const SEG_COUNT = SETS.length;
    const SEG_ANGLE = TAU / SEG_COUNT;

    const colors = [
        '#E86B6B', '#4A9EAA', '#5DBF9E', '#F0A64A', '#C96A9E',
        '#7C609A', '#3BA87A', '#D98F2B', '#2E5C6E', '#B84C7A',
        '#E89F3E', '#1E7A8C', '#DABB6A', '#5A8FAE', '#B6885A',
        '#D15A5A', '#3C6E8F', '#F0874A', '#6C548E', '#2A7F6A'
    ];

    function drawWheel(rot) {
        const sz = canvas.width;
        const cx = sz/2, cy = sz/2;
        const rad = sz/2 - 12;
        ctx.clearRect(0, 0, sz, sz);
        
        for (let i = 0; i < SEG_COUNT; i++) {
            const start = i * SEG_ANGLE + rot;
            const end = start + SEG_ANGLE;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, rad, start, end);
            ctx.closePath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.save();
            ctx.strokeStyle = 'rgba(255,255,240,0.4)';
            ctx.lineWidth = 1.2;
            ctx.stroke();
            ctx.translate(cx, cy);
            ctx.rotate(start + SEG_ANGLE/2);
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${Math.min(16, rad/5.8)}px "Segoe UI", "Inter"`;
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 2;
            ctx.fillText(SETS[i].name, rad*0.68, 6);
            ctx.setTransform(1,0,0,1,0,0);
        }
        // Inner circle
        ctx.beginPath();
        ctx.arc(cx, cy, 20, 0, TAU);
        ctx.fillStyle = '#0A0F1A';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 14, 0, TAU);
        ctx.fillStyle = '#00D4AA';
        ctx.fill();
    }

    // Get which set the pointer is pointing to based on wheel rotation
    function getSetFromRotation(rot) {
        const pointerAngle = -PI / 2; // 12 o'clock
        let wheelAngleAtPointer = (pointerAngle - rot) % TAU;
        if (wheelAngleAtPointer < 0) wheelAngleAtPointer += TAU;
        let idx = Math.floor(wheelAngleAtPointer / SEG_ANGLE);
        if (idx >= SEG_COUNT) idx = SEG_COUNT - 1;
        return { index: idx, set: SETS[idx] };
    }

    // Calculate rotation needed so a specific set is under the pointer
    function getRotationForSet(setIndex) {
        const pointerAngle = -PI / 2;
        const targetSegmentCenter = setIndex * SEG_ANGLE + SEG_ANGLE/2;
        let neededRot = pointerAngle - targetSegmentCenter;
        neededRot = ((neededRot % TAU) + TAU) % TAU;
        return neededRot;
    }

    function animateSpin(now) {
        const elapsed = now - spinStartTime;
        let t = Math.min(1, elapsed / spinDuration);
        
        // Natural deceleration - ease out cubic
        const easeOut = 1 - Math.pow(1 - t, 3.5);
        
        const newRot = startRotation + (targetRotation - startRotation) * easeOut;
        currentRotation = newRot % TAU;
        drawWheel(currentRotation);
        
        if (t < 1) {
            animFrame = requestAnimationFrame(animateSpin);
        } else {
            // Final exact position
            currentRotation = targetRotation % TAU;
            drawWheel(currentRotation);
            
            // Get the set that the pointer is actually pointing to
            const landed = getSetFromRotation(currentRotation);
            
            // Update UI with the ACTUAL landed set
            updateUI(landed.set, landed.index);
            
            spinning = false;
            document.getElementById('spinBtn').disabled = false;
            cancelAnimationFrame(animFrame);
        }
    }

    function updateUI(set, idx) {
        document.getElementById('questionText').innerHTML = `${set.name}`;
        document.getElementById('linkContainer').innerHTML = `<a href="${set.url}" target="_blank" class="link-button">📋 OPEN ${set.name} →</a>`;
        
        recentSelections.unshift(set.name);
        if (recentSelections.length > 6) recentSelections.pop();
        
        const histDiv = document.getElementById('historyContainer');
        if (recentSelections.length === 0) {
            histDiv.innerHTML = '<span style="color:#555;font-size:0.7rem;">—</span>';
        } else {
            histDiv.innerHTML = recentSelections.map(name => `<div class="history-item">${name}</div>`).join('');
        }
        
        spinCount++;
        document.getElementById('spinCount').innerHTML = `📊 Spins: ${spinCount}`;
        
        const card = document.getElementById('resultCard');
        card.style.transform = 'scale(1.01)';
        setTimeout(() => { card.style.transform = 'scale(1)'; }, 150);
    }

    function spinWheel() {
        if (spinning) return;
        
        spinning = true;
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        
        // 1. Randomly pick a set (pure random 1/20)
        const randomIndex = Math.floor(Math.random() * SETS.length);
        selectedSet = SETS[randomIndex];
        
        // 2. Calculate where the wheel needs to stop to show that set
        const targetStopRot = getRotationForSet(randomIndex);
        
        // 3. Add multiple full spins for the animation (5 to 12 rotations)
        const fullSpins = 5 + Math.random() * 8;
        const finalTarget = targetStopRot + (fullSpins * TAU);
        
        startRotation = currentRotation;
        targetRotation = finalTarget;
        spinStartTime = performance.now();
        
        animFrame = requestAnimationFrame(animateSpin);
    }

    function init() {
        // Random initial rotation
        currentRotation = Math.random() * TAU;
        drawWheel(currentRotation);
        document.getElementById('spinBtn').onclick = spinWheel;
    }

    init();
</script>
</body>
</html>
