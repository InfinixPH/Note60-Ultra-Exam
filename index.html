<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NOTE60 ULTRA | Exam Roulette</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 50%, rgba(15, 25, 45, 0.95), rgba(8, 12, 24, 0.98)),
                        url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDQwIDQwIj48cGF0aCBmaWxsPSIjMjgyYzNiIiBmaWxsLW9wYWNpdHk9IjAuMTUiIGQ9Ik0wIDBoNDB2NDBIMHoiLz48cGF0aCBmaWxsPSIjMjgyYzNiIiBmaWxsLW9wYWNpdHk9IjAuMDgiIGQ9Ik04IDBoMjR2NDBIOHoiLz48L3N2Zz4=');
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, sans-serif;
        }

        .glass-container {
            max-width: 700px;
            width: 100%;
            background: rgba(20, 28, 40, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 56px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 24px;
            transition: all 0.3s ease;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .badge {
            display: inline-block;
            background: linear-gradient(135deg, #00C9A7, #00B4D8);
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #0a0c15;
            margin-bottom: 12px;
            backdrop-filter: blur(4px);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #00C9A7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.65);
            font-size: 0.85rem;
            margin-top: 8px;
            font-weight: 400;
        }

        .roulette-wrapper {
            position: relative;
            margin: 20px 0 30px;
            display: flex;
            justify-content: center;
        }

        .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            border-radius: 50%;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.4), inset 0 1px 2px rgba(255,255,255,0.1);
            transition: none;
        }

        .pointer {
            position: absolute;
            top: -28px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 22px solid transparent;
            border-right: 22px solid transparent;
            border-top: 48px solid #00C9A7;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            z-index: 10;
        }
        .pointer::after {
            content: "▼";
            position: absolute;
            top: -52px;
            left: -12px;
            font-size: 22px;
            color: #00C9A7;
            text-shadow: 0 2px 4px black;
        }

        .spin-btn {
            display: block;
            width: 85%;
            margin: 10px auto 20px;
            padding: 16px 24px;
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(95deg, #FFFFFF12, #FFFFFF08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 201, 167, 0.5);
            border-radius: 60px;
            color: #A8F0E0;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .spin-btn:hover {
            background: rgba(0, 201, 167, 0.2);
            border-color: #00C9A7;
            color: white;
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .spin-btn:active { transform: scale(0.98); }
        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result-card {
            background: rgba(10, 15, 25, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 20px;
            margin: 15px 0;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
            transition: all 0.2s ease;
        }
        .result-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00C9A7;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            color: #F0F3FA;
            margin: 8px 0;
        }
        .link-button {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #00C9A7, #009B82);
            padding: 12px 28px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            margin-top: 10px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,240,0.3);
            font-size: 0.95rem;
        }
        .link-button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #009B82, #006D5C);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .history-section {
            margin-top: 20px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.15);
        }
        .history-title {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 10px;
            text-align: center;
            letter-spacing: 1px;
        }
        .history-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
        }
        .history-item {
            background: rgba(255,255,245,0.08);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: #bbb;
            border: 1px solid rgba(0, 201, 167, 0.15);
            font-weight: 500;
        }
        .spin-count {
            text-align: center;
            font-size: 0.7rem;
            color: #888;
            margin-top: 12px;
        }

        @media (max-width: 500px) {
            .glass-container { padding: 18px; }
            .wheel-container { width: 260px; height: 260px; }
            h1 { font-size: 1.8rem; }
            .question-text { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="glass-container">
    <div class="header">
        <div class="badge">✦ INFINIX ✦</div>
        <h1>NOTE60 <span style="font-weight:300">INFINIX</span><br>Exam Roulette</h1>
        <div class="subtitle">Randomized Questionnaire Selector</div>
    </div>

    <div class="roulette-wrapper">
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="540" height="540"></canvas>
        </div>
    </div>

    <button class="spin-btn" id="spinBtn">🎡 SPIN THE WHEEL 🎡</button>

    <div class="result-card" id="resultCard">
        <div class="result-label">▼ SELECTED SET ▼</div>
        <div class="question-text" id="questionText">—</div>
        <div id="linkContainer"></div>
    </div>

    <div class="spin-count" id="spinCount">📊 Spins: 0</div>

    <div class="history-section">
        <div class="history-title">📋 Recently Selected</div>
        <div class="history-buttons" id="historyContainer"></div>
    </div>
</div>

<script>
    // ========= YOUR 20 SETS ==========
    const SETS = [
        { name: "Set 1", url: "https://docs.google.com/forms/d/e/1FAIpQLSeHpQSDFGjW5d3yHboSE4D_QshslNxZuikmeneb6ARftuF3lw/viewform" },
        { name: "Set 2", url: "https://docs.google.com/forms/d/e/1FAIpQLSdXfW_rqCEOmDeXQOHIOb9sLNtlL16kzUJtSF-Q79NkzjHBCQ/viewform" },
        { name: "Set 3", url: "https://docs.google.com/forms/d/e/1FAIpQLSe13C_V53ymlA1NshbOmGvDlL0-FOYuDLBIUiRis5fLNri2FQ/viewform" },
        { name: "Set 4", url: "https://docs.google.com/forms/d/e/1FAIpQLSdoA9FpiCn-rmgZPMcf-Ljq18h6QVYInd_8Q4VvvXudqQ-Bvg/viewform" },
        { name: "Set 5", url: "https://docs.google.com/forms/d/e/1FAIpQLSffkCh9xHtWfx4FglPH7MiVLZUVbbG7M2nyC1GFfwXvYBWRVg/viewform" },
        { name: "Set 6", url: "https://forms.gle/6ms39r81DU58GqXe6" },
        { name: "Set 7", url: "https://forms.gle/bQ9d4rAE5nQ4JLWa6" },
        { name: "Set 8", url: "https://forms.gle/KuHW3ot8JC5WMbPB6" },
        { name: "Set 9", url: "https://forms.gle/DVTTpApdT2qxZUHD7" },
        { name: "Set 10", url: "https://forms.gle/z5ucuMpWnnVD3snt7" },
        { name: "Set 11", url: "https://forms.gle/e154QuYQEa4p9xzX8" },
        { name: "Set 12", url: "https://forms.gle/emvJBwbyrDAtj7566" },
        { name: "Set 13", url: "https://forms.gle/6oG5cdZtspPUhQvr5" },
        { name: "Set 14", url: "https://forms.gle/p7nApE3VbEV3Z7iv5" },
        { name: "Set 15", url: "https://forms.gle/dMvDKbdQbBKSueHz8" },
        { name: "Set 16", url: "https://docs.google.com/forms/d/e/1FAIpQLSftVcYHnfj9jkb4XrPjuSfpDOR0JXpCSeJY39OiGk0AnNt0ew/viewform" },
        { name: "Set 17", url: "https://docs.google.com/forms/d/e/1FAIpQLScx5QHRe-6KIpJERyjo9x1kiyCUqsVRSycLKTeX7_eKog_Q7Q/viewform" },
        { name: "Set 18", url: "https://docs.google.com/forms/d/e/1FAIpQLSdTNHWbs1CGLNoECir7f0wp2Q9QfAXh6n9pNm1MajRlvqAWvA/viewform" },
        { name: "Set 19", url: "https://docs.google.com/forms/d/e/1FAIpQLSdYKy6JD7RhKNQZSn_wvPPOTtA9I6pd33Yxrcym4Qm5OFoB6w/viewform" },
        { name: "Set 20", url: "https://docs.google.com/forms/d/e/1FAIpQLSeujgdKpQtNv4wGX4xFxGeSbGZgilIYSnOokzMdQorka_O4gQ/viewform" }
    ];
    // ================================

    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    let currentRotation = 0;
    let spinning = false;
    let spinCount = 0;
    let recentSelections = [];
    let animFrame = null;
    let spinStartTime = 0;
    let spinDuration = 2800; // Slightly longer for more natural feel
    let startRotation = 0;
    let targetRotation = 0;
    let selectedSetIndex = null; // Store the randomly selected set before animating

    const PI = Math.PI;
    const TAU = PI * 2;
    const SEG_COUNT = SETS.length;
    const SEG_ANGLE = TAU / SEG_COUNT;

    const colors = [
        '#C44545', '#3A7CA5', '#44B39D', '#E9B35F', '#B56576',
        '#6D597A', '#4C9F70', '#E28413', '#2F4858', '#A23B72',
        '#F18F01', '#1E6091', '#D9BF77', '#6C9EBF', '#A37C6B',
        '#BC4A51', '#3D5A80', '#EE6C4D', '#5E548E', '#2D6A4F'
    ];

    function drawWheel(rot) {
        const sz = canvas.width;
        const cx = sz/2, cy = sz/2;
        const rad = sz/2 - 10;
        ctx.clearRect(0, 0, sz, sz);
        for (let i = 0; i < SEG_COUNT; i++) {
            const start = i * SEG_ANGLE + rot;
            const end = start + SEG_ANGLE;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.arc(cx, cy, rad, start, end);
            ctx.closePath();
            ctx.fillStyle = colors[i % colors.length];
            ctx.fill();
            ctx.save();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = 'rgba(255,255,200,0.5)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.translate(cx, cy);
            ctx.rotate(start + SEG_ANGLE/2);
            ctx.fillStyle = '#FFFFFFEE';
            ctx.font = `bold ${Math.min(18, rad/5.5)}px "Segoe UI", "Inter"`;
            ctx.shadowColor = 'rgba(0,0,0,0.4)';
            ctx.fillText(SETS[i].name, rad*0.68, 6);
            ctx.setTransform(1,0,0,1,0,0);
        }
        ctx.beginPath();
        ctx.arc(cx, cy, 22, 0, TAU);
        ctx.fillStyle = '#1A1F2E';
        ctx.shadowBlur = 0;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, 16, 0, TAU);
        ctx.fillStyle = '#00C9A7';
        ctx.fill();
    }

    // Calculate the rotation needed so that a specific segment aligns with the pointer
    function getRotationForSegment(segmentIndex, currentRot) {
        const pointerAngle = -PI / 2; // Pointer at top (12 o'clock)
        // We want: pointerAngle = segmentCenterAngle + rotation
        const segmentCenter = segmentIndex * SEG_ANGLE + SEG_ANGLE/2;
        let neededRotation = pointerAngle - segmentCenter;
        // Normalize to 0..TAU
        neededRotation = ((neededRotation % TAU) + TAU) % TAU;
        return neededRotation;
    }

    // Pure random selection - 1/20 chance every spin
    function getRandomSet() {
        const randomIndex = Math.floor(Math.random() * SETS.length);
        return { index: randomIndex, set: SETS[randomIndex] };
    }

    function animateSpin(now) {
        const elapsed = now - spinStartTime;
        let t = Math.min(1, elapsed / spinDuration);
        
        // SUPER NATURAL EASING: easeOutQuart (slows down dramatically at the end)
        // This creates that "almost stopping... then finally landing" feel
        const easeOutQuart = 1 - Math.pow(1 - t, 4);
        
        const newRot = startRotation + (targetRotation - startRotation) * easeOutQuart;
        currentRotation = newRot % TAU;
        drawWheel(currentRotation);
        
        if (t < 1) {
            animFrame = requestAnimationFrame(animateSpin);
        } else {
            // Final exact position
            currentRotation = targetRotation % TAU;
            drawWheel(currentRotation);
            
            // Update UI with the pre-selected random set
            updateUI(selectedSetIndex.set, selectedSetIndex.index);
            
            spinning = false;
            document.getElementById('spinBtn').disabled = false;
            cancelAnimationFrame(animFrame);
        }
    }

    function updateUI(set, idx) {
        const questionDiv = document.getElementById('questionText');
        const linkDiv = document.getElementById('linkContainer');
        questionDiv.innerHTML = `${set.name}`;
        linkDiv.innerHTML = `<a href="${set.url}" target="_blank" class="link-button">📋 OPEN ${set.name} →</a>`;
        recentSelections.unshift(set.name);
        if (recentSelections.length > 6) recentSelections.pop();
        updateHistory();
        spinCount++;
        document.getElementById('spinCount').innerHTML = `📊 Spins: ${spinCount}`;
        const card = document.getElementById('resultCard');
        card.style.transform = 'scale(1.01)';
        setTimeout(() => { card.style.transform = 'scale(1)'; }, 180);
    }

    function updateHistory() {
        const histDiv = document.getElementById('historyContainer');
        if (!recentSelections.length) {
            histDiv.innerHTML = '<span style="color:#666;font-size:0.7rem;">—</span>';
            return;
        }
        histDiv.innerHTML = recentSelections.map(name => 
            `<div class="history-item">${name}</div>`
        ).join('');
    }

    function spinWheel() {
        if (spinning) return;
        
        spinning = true;
        const btn = document.getElementById('spinBtn');
        btn.disabled = true;
        
        // STEP 1: Pick a random set (PURE RANDOM - 1/20 chance)
        selectedSetIndex = getRandomSet();
        
        // STEP 2: Calculate where the wheel needs to stop to show that set
        const targetStopRotation = getRotationForSegment(selectedSetIndex.index, currentRotation);
        
        // STEP 3: Add multiple full rotations for spinning effect (4 to 9 full turns)
        const fullSpins = 4 + Math.random() * 6; // 4 to 10 rotations
        const finalTarget = targetStopRotation + (fullSpins * TAU);
        
        startRotation = currentRotation;
        targetRotation = finalTarget;
        spinStartTime = performance.now();
        
        animFrame = requestAnimationFrame(animateSpin);
    }

    function init() {
        // Random initial rotation so wheel isn't always aligned the same way
        currentRotation = Math.random() * TAU;
        drawWheel(currentRotation);
        document.getElementById('spinBtn').onclick = spinWheel;
        updateHistory();
    }

    init();
</script>
</body>
</html>
